<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Sach Sinh Vien</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .tim-kiem { display: flex; gap: 8px; }
        .tim-kiem input {
            padding: 6px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; width: 250px;
        }
        .btn {
            padding: 6px 16px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block;
        }
        .btn-primary { background-color: #1a6fa6; color: white; }
        .btn-primary:hover { background-color: #145480; }
        .btn-success { background-color: #1e7e34; color: white; }
        .btn-success:hover { background-color: #145a23; }

        .ket-qua { font-size: 13px; color: #555; margin-bottom: 8px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:hover { background-color: #f9f9f9; }

        /* Bai tap 7.2: To mau do sinh vien duoi 18 tuoi */
        .duoi-18 { color: red; font-weight: bold; }

        .btn-detail {
            padding: 4px 10px; background-color: #6c757d; color: white;
            border-radius: 4px; text-decoration: none; font-size: 13px;
        }
        .btn-detail:hover { background-color: #545b62; }
    </style>
</head>
<body>

<h1>Danh Sach Sinh Vien (SSR)</h1>

<div class="toolbar">
    <!-- Form tim kiem -->
    <form class="tim-kiem" action="/students" method="GET">
        <input type="text" name="keyword"
               placeholder="Nhap ten sinh vien..."
               th:value="${keyword}" />
        <button type="submit" class="btn btn-primary">Tim Kiem</button>
    </form>
    <!-- Nut Them Moi -->
    <a href="/students/new" class="btn btn-success">+ Them Moi</a>
</div>

<!-- Hien thi so ket qua -->
<p class="ket-qua"
   th:text="${keyword != null && !#strings.isEmpty(keyword)}
             ? 'Ket qua tim kiem cho &quot;' + ${keyword} + '&quot;: ' + ${#lists.size(dsSinhVien)} + ' sinh vien'
             : 'Tong so: ' + ${#lists.size(dsSinhVien)} + ' sinh vien'">
</p>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Ho va Ten</th>
            <th>Email</th>
            <th>Tuoi</th>
            <th>Hanh Dong</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="student : ${dsSinhVien}"
            th:class="${student.age < 18} ? 'duoi-18' : ''">
            <td th:text="${student.id}">ID Mau</td>
            <td th:text="${student.name}">Ten Mau</td>
            <td th:text="${student.email}">Email Mau</td>
            <td th:text="${student.age}">0</td>
            <td>
                <a th:href="@{/students/{id}(id=${student.id})}" class="btn-detail">Xem Chi Tiet</a>
            </td>
        </tr>
        <!-- Hien thi thong bao neu khong co ket qua -->
        <tr th:if="${#lists.isEmpty(dsSinhVien)}">
            <td colspan="5" style="text-align:center; color:#999;">
                Khong tim thay sinh vien nao.
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiet Sinh Vien</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card {
            max-width: 480px; border: 1px solid #ddd;
            border-radius: 8px; padding: 24px; margin-top: 16px;
        }
        .card h2 { margin-top: 0; }
        .field { margin-bottom: 12px; }
        .field label { font-weight: bold; display: inline-block; width: 80px; color: #555; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        .btn {
            padding: 8px 18px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block;
        }
        .btn-edit { background-color: #1a6fa6; color: white; }
        .btn-edit:hover { background-color: #145480; }
        .btn-delete { background-color: #b71c1c; color: white; }
        .btn-delete:hover { background-color: #7f1212; }
        .btn-back { background-color: #6c757d; color: white; }
        .btn-back:hover { background-color: #4a5258; }
    </style>
</head>
<body>

<h1>Chi Tiet Sinh Vien</h1>

<div class="card">
    <h2 th:text="${student.name}">Ten Sinh Vien</h2>

    <div class="field">
        <label>ID:</label>
        <span th:text="${student.id}">0</span>
    </div>
    <div class="field">
        <label>Ho ten:</label>
        <span th:text="${student.name}">Ten</span>
    </div>
    <div class="field">
        <label>Email:</label>
        <span th:text="${student.email}">Email</span>
    </div>
    <div class="field">
        <label>Tuoi:</label>
        <span th:text="${student.age}">0</span>
    </div>

    <div class="actions">
        <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-edit">Chinh Sua</a>

        <!-- Nut Xoa: yeu cau xac nhan truoc khi thuc hien -->
        <form th:action="@{/students/{id}/delete(id=${student.id})}" method="POST"
              onsubmit="return confirm('Ban co chac chan muon xoa sinh vien nay?')">
            <button type="submit" class="btn btn-delete">Xoa</button>
        </form>

        <a href="/students" class="btn btn-back">Quay Lai</a>
    </div>
</div>

</body>
</html>

spring.application.name=student-management

# Port: Render truyen qua bien PORT, local mac dinh 8080
server.port=${PORT:8080}

# Database (PostgreSQL)
# - Production (Render + Neon): dat bien DATABASE_URL, DB_USERNAME, DB_PASSWORD tren Render dashboard
# - Local (dev): doc tu file .env qua dotenv-java
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/student_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
